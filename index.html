<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template</title>

    <link rel="icon" type="image/png" href="./imgs/fav-icon.png" />

    <!-- * CSS -->
    <link rel="stylesheet" href="./css/all.min.css" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="quote">
        <div class="quote-text">
          <i class="fa-solid fa-quote-left quote-icon"></i>
          <span class="quote-text" id="quote"
            >What you are, is what you have been. What you will be , is what you
            do now.</span
          >
        </div>
        <h2 class="quote-author" id="author">Bohood</h2>
        <div class="button-container">
          <button class="btn btn-twitter" id="twitterBtn">
            <i class="fa-brands fa-twitter"></i>
          </button>
          <button class="btn" id="newQuoteBtn">New Quote</button>
        </div>
      </div>
    </div>
    <script src="./js/script.js"></script>
  </body>
</html>
